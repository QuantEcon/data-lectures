# ---------------------------------------------------------------------------
# Live-API uses, keyed repo:lecture:access. `pedagogy` says WHY the call is
# live (prior audit §8): "lesson" = the fetch workflow is the teaching point;
# "mixed" = discovery workflow is taught but the plots could read a snapshot;
# "incidental" = the lecture just needs a series — snapshot-ready.
# ---------------------------------------------------------------------------
api:
  lecture-python-intro:business_cycle:wbgapi:
    series: NY.GDP.MKTP.KD.ZG, SL.UEM.TOTL.NE.ZS, FS.AST.PRVT.GD.ZS
    pedagogy: mixed
    note: teaches wb.series.info querying and metadata as part of the narrative
  lecture-python-intro:business_cycle:pandas_datareader:
    series: UNRATE, USREC, M0892AUSM156SNBR, UMCSENT, CPILFESL, INDPRO
    pedagogy: mixed
    note: snapshot pipeline already exists (data-lectures business_cycle_data.csv) but is unadopted
  lecture-python-intro:commod_price:yfinance:
    series: CT=F
    pedagogy: incidental
  lecture-python-intro:heavy_tails:wbgapi:
    series: NY.GDP.MKTP.CD
    pedagogy: incidental
  lecture-python-intro:heavy_tails:yfinance:
    series: AMZN, BTC-USD
    pedagogy: incidental
  lecture-python-intro:inequality:wbgapi:
    series: SI.POV.GINI, NY.GDP.PCAP.KD
    pedagogy: mixed
    note: demonstrates searching for the Gini series ID with wbgapi
  lecture-python-intro:prob_dist:yfinance:
    series: AMZN, COST
    pedagogy: incidental
  lecture-python-programming:pandas:wbgapi:
