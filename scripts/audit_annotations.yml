# audit_annotations.yml — curated judgment for the data-audit dashboard.
#
# The scanner (build_audit.py) derives every mechanical fact from the lecture
# repos themselves: who reads what, from where, by which URL form. What it
# cannot derive is judgment — what a file contains, how it came to exist, why
# a lecture calls a live API. That lives here, keyed by the scanner's output,
# and the scan warns (or fails with --strict) whenever a NEW reference appears
# with no entry, so this file cannot silently rot.
#
# Migrated datasets (lectures/*.yml manifests) do NOT get entries in
# `datasets:` — the manifest is their source of truth.
#
# provenance values (prior audit §7, feeding manual#108):
#   verbatim              third-party file as distributed; citation is the provenance
#   constructed-committed built by a script/notebook that is committed somewhere
#   constructed-lost      construction documented but the pipeline never committed
#   author-assembled      hand-built by authors; provenance is lecture prose only
#   toy                   invented in-lecture teaching table

datasets:
  SCF_plus_mini.csv:
    description: SCF+ wealth/income survey extract
    provenance: constructed-committed
    note: built by generating_mini.md (executable MyST) in high_dim_data from SCF_plus.dta
